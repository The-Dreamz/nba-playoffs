<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NBA Playoffs Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;
  --card:#161618;
  --hdr:#111113;
  --gold:#e8a020;
  --gold2:#f5c050;
  --white:#e8e6e1;
  --muted:#52504c;
  --sep:#1e1e20;
  --green:#2ea84f;
  --red:#c94040;
  --row2:#131315;
  --border:#252525;
  --accent:#1c1c1e;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:var(--font-body);font-size:14px;line-height:1.4}

/* ── NAV ── */
.nav{
  background:#0a0a0b;
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;align-items:stretch;
  position:sticky;top:0;z-index:100;
  gap:0;
}
.nav-brand{
  font-family:var(--font-display);
  font-size:26px;
  color:var(--gold);letter-spacing:.12em;
  padding:14px 24px 14px 0;
  border-right:1px solid var(--border);
  margin-right:6px;white-space:nowrap;
  display:flex;align-items:center;
}
.nav-tab{
  padding:0 20px;font-size:12px;font-weight:500;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  border-top:2px solid transparent;
  transition:color .15s,border-color .15s;
  white-space:nowrap;user-select:none;
  display:flex;align-items:center;
  letter-spacing:.08em;text-transform:uppercase;
}
.nav-tab:hover{color:#8a8880}
.nav-tab.active{color:var(--white);border-bottom-color:var(--gold)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;display:none;flex-shrink:0}
.live-lbl{font-size:10px;color:var(--green);font-weight:600;letter-spacing:.12em;display:none;text-transform:uppercase}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

.btn{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:7px 16px;border-radius:3px;
  font-family:var(--font-body);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;
  letter-spacing:.06em;text-transform:uppercase;
}
.btn:hover{border-color:#444;color:var(--white)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#0a0a0b;font-weight:700}
.btn.gold:hover{background:var(--gold2);border-color:var(--gold2)}
.btn:disabled{opacity:.25;cursor:default}

/* ── VIEWS ── */
.view{display:none;padding:22px 28px;max-width:1600px;margin:0 auto;min-height:calc(100vh - 120px)}
.view.active{display:block}

/* ── API BANNER ── */
.api-banner{
  border:1px solid var(--border);
  border-left:2px solid var(--green);border-radius:3px;
  padding:8px 14px;margin-bottom:18px;
  display:flex;align-items:center;gap:10px;
  font-size:11px;color:var(--muted);
  font-family:var(--font-mono);letter-spacing:.02em;
}
.api-banner.err{border-left-color:#333;color:#3a3835}
.api-banner.loading{border-left-color:var(--gold)}
.adot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.adot.ok{background:var(--green)}
.adot.loading{background:var(--gold);animation:blink .9s infinite}
.adot.err{background:#2a2a2a}

/* ── SERIES PILLS ── */
.series-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.pill{
  padding:6px 14px;border-radius:2px;
  border:1px solid var(--border);
  color:var(--muted);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;user-select:none;
  letter-spacing:.06em;text-transform:uppercase;
  font-family:var(--font-body);
}
.pill:hover{border-color:#3a3a3a;color:#8a8880}
.pill.active{background:var(--gold);border-color:var(--gold);color:#0a0a0b;font-weight:700}
.pill.lv{border-color:#1a3a24;color:var(--green)}
.pill.lv.active{background:var(--green);border-color:var(--green);color:#0a0a0b}

/* ── SERIES BANNER ── */
.sbanner{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;margin-bottom:2px;
  background:var(--hdr);
  border-radius:3px 3px 0 0;
  border:1px solid var(--border);border-bottom:2px solid var(--gold);
}
.sbanner h2{font-family:var(--font-display);font-size:30px;color:var(--white);letter-spacing:.12em}
.sres{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono)}
.sres.done{color:var(--green)}
.sres.lv{color:var(--gold)}

/* ── GAME GRID ── */
.game-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.gc-center{display:flex;justify-content:center;margin-bottom:10px}
.gc-center .gc{width:calc(33.33% - 7px)}
.gc{background:var(--card);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.gc.live-game{border-color:var(--green)}

/* ── GAME CARD HEADER ── */
.gc-hdr{
  background:var(--hdr);
  padding:12px 14px 10px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  gap:10px;
}
.gc-hdr-left{display:flex;align-items:center;gap:10px}
.gc-logos{display:flex;align-items:center;gap:4px}
.gc-logo{width:28px;height:28px;object-fit:contain;opacity:.9;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
.gc-logo-sep{font-size:10px;color:var(--border);font-family:var(--font-mono)}
.gc-hdr-info{}
.gc-g{font-family:var(--font-display);font-size:18px;color:var(--white);letter-spacing:.1em;line-height:1}
.gc-sub{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.02em;font-family:var(--font-mono)}
.gc-fb{text-align:right;font-size:10px;color:var(--muted);line-height:1.8;font-family:var(--font-mono)}
.gc-fb strong{color:#6a6860;display:block;font-size:10px;font-weight:500}

/* ── SCOREBOX ── */
.gc-ch{
  display:grid;
  grid-template-columns:52px repeat(4,1fr) 8px repeat(2,1fr) 1.3fr 36px;
  padding:5px 14px;background:var(--hdr);
  border-top:1px solid var(--sep);
}
.gc-ch span{font-size:9px;font-weight:500;color:var(--muted);text-align:center;letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono)}
.gc-ch span:first-child{text-align:left}

.gc-row{
  display:grid;
  grid-template-columns:52px repeat(4,1fr) 8px repeat(2,1fr) 1.3fr 36px;
  padding:9px 14px;align-items:center;
}
.gc-row.r1{background:var(--card);border-top:1px solid var(--sep)}
.gc-row.r2{background:var(--row2)}
.gc-row span{text-align:center;font-size:13px;color:#343430;font-family:var(--font-mono)}
.gc-row .tn{text-align:left;font-weight:700;font-size:13px;letter-spacing:.06em;font-family:var(--font-body)}
.gc-row .wc{color:var(--gold);font-weight:600}
.gc-row .fs{color:var(--white);font-weight:700;font-size:18px;letter-spacing:-.01em;font-family:var(--font-display)}
.gc-row .sp{color:var(--sep)}
.wb{
  background:var(--gold);color:#0a0a0b;font-weight:700;
  font-size:8px;padding:3px 6px;border-radius:2px;
  display:inline-block;letter-spacing:.06em;font-family:var(--font-body);
}
.pend{
  font-size:11px;color:var(--muted);text-align:center;
  padding:20px;background:var(--hdr);
  letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono);
}
.live-badge{
  background:var(--green);color:#0a0a0b;
  font-size:8px;font-weight:700;padding:2px 5px;
  border-radius:2px;display:inline-block;
  margin-left:6px;vertical-align:middle;letter-spacing:.08em;
}

/* ── SUMMARY ── */
.sum-wrap{display:flex;flex-direction:column;gap:10px}
.sum-block{background:var(--card);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.shdr{background:var(--hdr);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-left:2px solid var(--gold)}
.shdr.lv{border-left-color:var(--green)}
.shdr-t{font-family:var(--font-display);font-size:20px;color:var(--white);letter-spacing:.1em}
.shdr.lv .shdr-t{color:var(--white)}
.shdr-r{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono)}
.shdr-r.done{color:var(--green)}
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:9px;font-weight:500;color:var(--muted);text-align:center;padding:7px 10px;background:#0d0d0e;border-bottom:1px solid var(--border);letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono)}
.stbl th:first-child{text-align:left;padding-left:16px}
.stbl td{padding:9px 10px;text-align:center;font-size:12px;color:#343430;border-bottom:1px solid var(--sep);font-family:var(--font-mono)}
.stbl td:first-child{text-align:left;padding-left:16px;font-weight:600;font-family:var(--font-body)}
.stbl tr:nth-child(even) td{background:var(--row2)}
.stbl td.qw{color:var(--gold);font-weight:600}
.stbl td.pts{color:var(--white);font-weight:600}
.stbl td.pos{color:var(--green);font-weight:600}
.stbl td.neg{color:var(--red);font-weight:600}

/* ── TEAM PROFILE ── */
.psel{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.psel label{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono)}
select.tsel{
  background:var(--hdr);border:1px solid var(--border);
  color:var(--white);padding:9px 16px;border-radius:3px;
  font-family:var(--font-body);font-size:13px;font-weight:500;
  cursor:pointer;min-width:240px;
}
select.tsel:focus{outline:none;border-color:#444}
.pbanner{
  background:var(--card);border:1px solid var(--border);
  border-top:2px solid var(--gold);
  border-radius:3px;padding:20px;margin-bottom:16px;
  display:grid;grid-template-columns:repeat(5,1fr);gap:12px;
}
.sb{text-align:center}
.sb .v{font-family:var(--font-display);font-size:40px;color:var(--white);line-height:1}
.sb .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:6px;font-family:var(--font-mono)}
.pcard{background:var(--card);border-radius:3px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border)}
.pchdr{background:var(--hdr);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.pchdr h3{font-family:var(--font-display);font-size:22px;letter-spacing:.1em;color:var(--white)}
.ptbl{width:100%;border-collapse:collapse}
.ptbl th{font-size:9px;font-weight:500;color:var(--muted);text-align:center;padding:7px 10px;background:#0d0d0e;border-bottom:1px solid var(--border);letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono)}
.ptbl th:first-child{text-align:left;padding-left:16px;min-width:100px}
.ptbl td{padding:9px 10px;text-align:center;font-size:12px;color:#343430;border-bottom:1px solid var(--sep);font-family:var(--font-mono)}
.ptbl td:first-child{text-align:left;padding-left:16px;font-weight:600;color:var(--white);font-family:var(--font-body)}
.ptbl tr:nth-child(even) td{background:var(--row2)}
.ptbl td.hi{color:var(--gold);font-weight:600}
.ptbl td.pos{color:var(--green);font-weight:600}
.ptbl td.neg{color:var(--red);font-weight:600}
.ptbl td.tot{color:var(--white);font-weight:600}

/* ── STATUS BAR ── */
.statusbar{
  background:#080809;border-top:1px solid var(--border);
  padding:7px 28px;display:flex;align-items:center;gap:14px;
  font-size:10px;color:#343430;letter-spacing:.06em;
  font-family:var(--font-mono);
}
.statusbar .sr{margin-left:auto}
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .game-grid{grid-template-columns:repeat(2,1fr)}
  .gc-center .gc{width:calc(50% - 5px)}
}
@media(max-width:768px){
  .game-grid{grid-template-columns:1fr}
  .gc-center .gc{width:100%}
  .pbanner{grid-template-columns:repeat(3,1fr)}
  .nav-brand{font-size:20px;padding:12px 14px 12px 0}
  .view{padding:12px 14px}
  .nav{padding:0 14px}
  .statusbar{padding:7px 14px}
}
</style>
</head>

let DATA = {};
Object.keys(STATIC).forEach(k => {

// Team logo helper — ESPN CDN, lowercase abbreviation
// SA → spurs (ESPN uses 'sa' for Spurs), SAS → sa mapping handled below
const LOGO_ABBR = {
  'SA':'sa','SAS':'sa','OKC':'okc','PHX':'phx','MIN':'min','DEN':'den',
  'NYK':'ny','ATL':'atl','LAL':'lal','HOU':'hou','DET':'det','ORL':'orl',
  'CLE':'cle','TOR':'tor','BOS':'bos','PHI':'phi'
};
function logoUrl(abbr){
  const k = LOGO_ABBR[abbr] || abbr.toLowerCase();
  return `https://a.espncdn.com/i/teamlogos/nba/500/${k}.png`;
}
let autoInterval = null;

function tc(key, team) {
  const s = DATA[key];
  const i = s.teams.indexOf(team);
  return i >= 0 ? s.colors[i] : "#fff";
}

function playedGames(key) {
  return DATA[key].games.filter(g => !g.pending && g.aq);
}

function setApiStatus(state, msg) {
  document.getElementById('apiBanner').className = 'api-banner ' + state;
  document.getElementById('apiDot').className = 'adot ' + state;
  document.getElementById('apiMsg').textContent = msg;
}

async function fetchESPN() {
  setApiStatus('loading', 'Fetching live data from ESPN...');
  try {
    const url = PROXY + encodeURIComponent(ESPN_SB + "?limit=30");
    const res = await fetch(url, { headers: { "x-requested-with": "XMLHttpRequest" } });
    if (!res.ok) throw new Error(res.status);
    const json = await res.json();
    const events = json.events || [];
    let updated = 0, liveCount = 0;

    for (const evt of events) {
      const comp = evt.competitions?.[0];
      if (!comp) continue;
      const statusName = evt.status?.type?.name;
      const isLive = statusName === "STATUS_IN_PROGRESS";
      const isFinal = statusName === "STATUS_FINAL";
      if (!isLive && !isFinal) continue;
      if (isLive) liveCount++;

      const home = comp.competitors?.find(c => c.homeAway === "home");
      const away = comp.competitors?.find(c => c.homeAway === "away");
      if (!home || !away) continue;

      const homeAbbr = home.team?.abbreviation?.toUpperCase();
      const awayAbbr = away.team?.abbreviation?.toUpperCase();

      const seriesKey = Object.keys(DATA).find(k => {
        const t = DATA[k].teams;
        return t.includes(homeAbbr) && t.includes(awayAbbr);
      });
      if (!seriesKey) continue;

      const lsHome = home.linescores || [];
      const lsAway = away.linescores || [];
      if (!lsHome.length) continue;

      const hq = lsHome.slice(0, 4).map(l => parseInt(l.value) || 0);
      const aq = lsAway.slice(0, 4).map(l => parseInt(l.value) || 0);
      while (hq.length < 4) hq.push(0);
      while (aq.length < 4) aq.push(0);

      const headline = evt.notes?.[0]?.headline || "";
      const gMatch = headline.match(/Game\s+(\d)/i);
      const gameNum = gMatch ? parseInt(gMatch[1]) : null;
      if (!gameNum) continue;

      const series = DATA[seriesKey];
      let game = series.games.find(g => g.g === gameNum);
      if (!game) {
        game = { g: gameNum, venue: "", away: awayAbbr, home: homeAbbr, aq: null, hq: null, fb_a: "—", fb_h: "—", pending: true };
        series.games.push(game);
        series.games.sort((a, b) => a.g - b.g);
      }

      game.aq = aq; game.hq = hq; game.pending = false;
      game.isLive = isLive;
      if (isLive) {
        game.liveInfo = `Q${evt.status?.period || ''} ${evt.status?.displayClock || ''}`.trim();
      } else {
        delete game.isLive; delete game.liveInfo;
      }
      updated++;

      if (isFinal) {
        const wins = {};
        series.teams.forEach(t => wins[t] = 0);
        series.games.forEach(g => {
          if (!g.aq) return;
          const at = g.aq.reduce((a, b) => a + b, 0);
          const ht = g.hq.reduce((a, b) => a + b, 0);
          if (at > ht) wins[g.away] = (wins[g.away] || 0) + 1;
          else wins[g.home] = (wins[g.home] || 0) + 1;
        });
        const winner = series.teams.find(t => wins[t] === 4);
        if (winner) {
          const loser = series.teams.find(t => t !== winner);
          series.result = `${winner} wins 4-${wins[loser] || 0}`;
          series.complete = true; series.live = false;
        } else {
          const w0 = wins[series.teams[0]] || 0, w1 = wins[series.teams[1]] || 0;
          if (w0 > w1) series.result = `${series.teams[0]} leads ${w0}-${w1}`;
          else if (w1 > w0) series.result = `${series.teams[1]} leads ${w1}-${w0}`;
          else series.result = `Series tied ${w0}-${w1}`;
        }
      }
    }

    const hasLive = liveCount > 0;
    document.getElementById('liveDot').style.display = hasLive ? 'block' : 'none';
    document.getElementById('liveLbl').style.display = hasLive ? 'block' : 'none';

    if (hasLive) {
      setApiStatus('ok', `${liveCount} game${liveCount>1?'s':''} in progress — refreshing automatically`);
      if (!autoInterval) autoInterval = setInterval(fetchAndRender, 90000);
    } else {
      setApiStatus('ok', `Scores up to date · ${updated} game${updated!==1?'s':''} synced · no games live right now`);
    }

    document.getElementById('statusTime').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
    document.getElementById('statusMsg').textContent = `${events.length} games found · ${updated} playoff updates applied`;

  } catch (e) {
    setApiStatus('err', `Live data offline — displaying cached scores. Auto-updates when accessed via the hosted site.`);
    document.getElementById('statusMsg').textContent = 'Cached data · live updates available on the hosted site';
  }
  reRenderAll();
}

async function fetchAndRender() { await fetchESPN(); reRenderAll(); }

function gameCard(game, key) {
  const s = DATA[key];
  if (game.pending || !game.aq) {
    return `<div class="gc">
      <div class="gc-hdr">
        <div class="gc-hdr-left">
          <div class="gc-logos">
            <img class="gc-logo" src="${logoUrl(game.away)}" alt="${game.away}" onerror="this.style.display='none'">
            <span class="gc-logo-sep">vs</span>
            <img class="gc-logo" src="${logoUrl(game.home)}" alt="${game.home}" onerror="this.style.display='none'">
          </div>
          <div class="gc-hdr-info">
            <div class="gc-g">Game ${game.g}${game.venue ? ' · ' + game.venue : ''}</div>
            <div class="gc-sub">${game.away} vs ${game.home}</div>
          </div>
        </div>
        <div class="gc-fb" style="color:var(--muted)">Upcoming</div>
      </div>
      <div class="pend">Not yet played</div></div>`;
  }

  const aq = game.aq, hq = game.hq;
  const at = aq.reduce((a, b) => a + b, 0), ht = hq.reduce((a, b) => a + b, 0);
  const awayWins = at > ht;
  const ac = tc(key, game.away), hc = tc(key, game.home);
  const afull = s.full[s.teams.indexOf(game.away)] || game.away;
  const hfull = s.full[s.teams.indexOf(game.home)] || game.home;
  const liveTag = game.isLive ? `<span class="live-badge">LIVE ${game.liveInfo || ''}</span>` : '';

  function trow(team, q, oq, wins, color, cls) {
    const h1 = q[0]+q[1], h2 = q[2]+q[3], oh1 = oq[0]+oq[1], oh2 = oq[2]+oq[3], tot = h1+h2;
    const qw = i => q[i] > oq[i] ? 'wc' : '';
    const badge = wins ? `<span class="wb">W</span>` : `<span style="color:#1a2a3a">&#8212;</span>`;
    const finalCls = game.isLive ? 'fs" style="color:var(--gold)' : 'fs';
    return `<div class="gc-row ${cls}">
      <span class="tn" style="color:${color}">&#9679; ${team}</span>
      <span class="${qw(0)}">${q[0]}</span><span class="${qw(1)}">${q[1]}</span>
      <span class="${qw(2)}">${q[2]}</span><span class="${qw(3)}">${q[3]}</span>
      <span class="sp"></span>
      <span class="${h1>oh1?'wc':''}">${h1}</span><span class="${h2>oh2?'wc':''}">${h2}</span>
      <span class="${finalCls}">${tot}</span><span>${badge}</span>
    </div>`;
  }

  return `<div class="gc${game.isLive ? ' live-game' : ''}">
    <div class="gc-hdr">
      <div class="gc-hdr-left">
        <div class="gc-logos">
          <img class="gc-logo" src="${logoUrl(game.away)}" alt="${game.away}" onerror="this.style.display='none'">
          <span class="gc-logo-sep">vs</span>
          <img class="gc-logo" src="${logoUrl(game.home)}" alt="${game.home}" onerror="this.style.display='none'">
        </div>
        <div class="gc-hdr-info">
          <div class="gc-g">Game ${game.g}${game.venue ? ' · ' + game.venue : ''} ${liveTag}</div>
          <div class="gc-sub">${afull} vs ${hfull}</div>
        </div>
      </div>
      <div class="gc-fb">1st bucket<strong>${game.away}: ${game.fb_a} &nbsp;·&nbsp; ${game.home}: ${game.fb_h}</strong></div>
    </div>
    <div class="gc-ch"><span></span><span>Q1</span><span>Q2</span><span>Q3</span><span>Q4</span><span></span><span>1H</span><span>2H</span><span>Final</span><span>W</span></div>
    ${trow(game.away, aq, hq, awayWins, ac, 'r1')}
    ${trow(game.home, hq, aq, !awayWins, hc, 'r2')}
  </div>`;
}

function renderSeries() {
  const s = DATA[currentSeries];
  const isLive = s.live && !s.complete;
  const rc = s.complete ? 'done' : (isLive ? 'lv' : '');
  let html = `<div class="sbanner"><h2>${currentSeries}</h2><span class="sres ${rc}">${s.result}</span></div>`;
  const games = s.games;
  html += `<div class="game-grid">${games.slice(0,3).map(g => gameCard(g, currentSeries)).join('')}</div>`;
  if (games.length > 3) {
    const row2 = games.slice(3, 6);
    html += `<div class="game-grid">${row2.map(g => gameCard(g, currentSeries)).join('')}</div>`;
  }
  const g7 = games.find(g => g.g === 7);
  if (g7) html += `<div class="gc-center">${gameCard(g7, currentSeries)}</div>`;
  document.getElementById('seriesContent').innerHTML = html;
}

function renderSeriesBar() {
  document.getElementById('seriesBar').innerHTML = Object.keys(DATA).map(k => {
    const s = DATA[k], isLive = s.live && !s.complete, isCur = k === currentSeries;
    return `<div class="pill ${isCur ? 'active' : ''} ${isLive && !isCur ? 'lv' : ''}" onclick="selectSeries('${k}')">${k}</div>`;
  }).join('');
}

function selectSeries(k) { currentSeries = k; renderSeriesBar(); renderSeries(); }

function renderSummary() {
  let html = '<div class="sum-wrap">';
  Object.entries(DATA).forEach(([key, s]) => {
    const pg = playedGames(key);
    if (!pg.length) return;
    const isLive = s.live && !s.complete;
    html += `<div class="sum-block"><div class="shdr${isLive?' lv':''}">
      <span class="shdr-t">${key}</span>
      <span class="shdr-r${s.complete?' done':''}">${s.result} &nbsp;·&nbsp; ${pg.length} GP</span>
    </div>
    <table class="stbl"><thead><tr>
      <th>Team</th><th>W-L</th><th>Avg Q1</th><th>Avg Q2</th><th>Avg Q3</th><th>Avg Q4</th>
      <th>Avg 1H</th><th>Avg 2H</th><th>Avg PTS</th><th>Margin</th>
    </tr></thead><tbody>`;
    s.teams.forEach((team, ti) => {
      const color = s.colors[ti];
      let sq = [0,0,0,0], oq = [0,0,0,0], wins = 0;
      pg.forEach(g => {
        const mq = g.home === team ? g.hq : g.aq;
        const opq = g.home === team ? g.aq : g.hq;
        mq.forEach((v,i) => { sq[i]+=v; }); opq.forEach((v,i) => { oq[i]+=v; });
        if (mq.reduce((a,b)=>a+b) > opq.reduce((a,b)=>a+b)) wins++;
      });
      const n = pg.length, av = v => (v/n).toFixed(1);
      const aq1=+av(sq[0]),aq2=+av(sq[1]),aq3=+av(sq[2]),aq4=+av(sq[3]);
      const a1h=+(aq1+aq2).toFixed(1),a2h=+(aq3+aq4).toFixed(1),apt=+(a1h+a2h).toFixed(1);
      const margin = +(apt - oq.reduce((a,b)=>a+b)/n).toFixed(1);
      const mc = margin > 0 ? 'pos' : margin < 0 ? 'neg' : '';
      html += `<tr>
        <td style="color:${color};font-weight:700">&#9679; ${team}</td>
        <td class="pts">${wins}-${n-wins}</td>
        <td class="${sq[0]>oq[0]?'qw':''}">${aq1}</td><td class="${sq[1]>oq[1]?'qw':''}">${aq2}</td>
        <td class="${sq[2]>oq[2]?'qw':''}">${aq3}</td><td class="${sq[3]>oq[3]?'qw':''}">${aq4}</td>
        <td class="${(sq[0]+sq[1])>(oq[0]+oq[1])?'qw':''}">${a1h}</td>
        <td class="${(sq[2]+sq[3])>(oq[2]+oq[3])?'qw':''}">${a2h}</td>
        <td class="pts">${apt}</td>
        <td class="${mc}">${margin>0?'+':''}${margin}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  html += '</div>';
  document.getElementById('summaryContent').innerHTML = html;
}

function buildTeamSelect() {
  const seen = {}, sel = document.getElementById('teamSel');
  Object.values(DATA).forEach(s => s.teams.forEach((t,i) => { if(!seen[t]) seen[t]=s.full[i]; }));
  Object.keys(seen).sort().forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = `${t}  —  ${seen[t]}`; sel.appendChild(o);
  });
}

function getTeamMeta(team) {
  let color = '#fff', full = team;
  Object.values(DATA).forEach(s => { const i=s.teams.indexOf(team); if(i>=0){color=s.colors[i];full=s.full[i];} });
  return { color, full };
}

function renderProfile() {
  const team = document.getElementById('teamSel').value;
  const el = document.getElementById('profileContent');
  if (!team) { el.innerHTML='<div style="color:var(--muted);font-size:12px;padding:20px">Select a team above.</div>'; return; }
  const { color, full } = getTeamMeta(team);
  let totalS=[0,0,0,0], totalA=[0,0,0,0], totalGP=0, totalW=0, cardsHtml='';

  Object.entries(DATA).forEach(([key,s]) => {
    if (!s.teams.includes(team)) return;
    const pg = playedGames(key);
    if (!pg.length) return;
    const opp = s.teams.find(t => t !== team);
    let sc=[0,0,0,0], al=[0,0,0,0], wins=0;
    pg.forEach(g => {
      const mq=g.home===team?g.hq:g.aq, oq=g.home===team?g.aq:g.hq;
      mq.forEach((v,i)=>{sc[i]+=v;totalS[i]+=v;});
      oq.forEach((v,i)=>{al[i]+=v;totalA[i]+=v;});
      if(mq.reduce((a,b)=>a+b)>oq.reduce((a,b)=>a+b)){wins++;totalW++;}
    });
    totalGP += pg.length;
    const n=pg.length, s1=sc[0]+sc[1], s2=sc[2]+sc[3], sT=s1+s2;
    const a1=al[0]+al[1], a2=al[2]+al[3], aT=a1+a2, m=sT-aT;
    const mc = m>0?'pos':'neg';
    const seriesWon = s.result.startsWith(team) && !s.result.includes('leads') && !s.result.includes('tied');
    cardsHtml += `<div class="pcard">
      <div class="pchdr">
        <h3 style="color:${color}">Round 1 vs ${opp}</h3>
        <span style="font-size:10px;color:${seriesWon?'var(--green)':'var(--muted)'};font-weight:600">${s.result} &nbsp;·&nbsp; ${n} GP &nbsp;·&nbsp; ${wins}-${n-wins}</span>
      </div>
      <table class="ptbl"><thead><tr>
        <th>Metric</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>1H</th><th>2H</th><th>Total</th><th>Avg/G</th><th>Margin</th>
      </tr></thead><tbody>
      <tr><td>Scored</td>
        ${sc.map((v,i)=>`<td class="${v>al[i]?'hi':''}">${v}</td>`).join('')}
        <td class="${s1>a1?'hi':''}">${s1}</td><td class="${s2>a2?'hi':''}">${s2}</td>
        <td class="tot">${sT}</td><td class="tot">${(sT/n).toFixed(1)}</td>
        <td class="${mc}">${m>0?'+':''}${m}</td>
      </tr>
      <tr><td>Allowed</td>
        ${al.map(v=>`<td>${v}</td>`).join('')}
        <td>${a1}</td><td>${a2}</td>
        <td class="tot">${aT}</td><td class="tot">${(aT/n).toFixed(1)}</td>
        <td></td>
      </tr>
      <tr><td>Avg/Game</td>
        ${sc.map((v,i)=>`<td class="${v>al[i]?'hi':''}">${(v/n).toFixed(1)}</td>`).join('')}
        <td class="${s1>a1?'hi':''}">${(s1/n).toFixed(1)}</td><td class="${s2>a2?'hi':''}">${(s2/n).toFixed(1)}</td>
        <td class="tot">${(sT/n).toFixed(1)}</td><td>&#8212;</td>
        <td class="${mc}">${m>0?'+':''}${(m/n).toFixed(1)}/gm</td>
      </tr>
      </tbody></table></div>`;
  });

  const tsT=totalS.reduce((a,b)=>a+b), taT=totalA.reduce((a,b)=>a+b), tm=tsT-taT;
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="width:8px;height:34px;background:${color};border-radius:2px"></div>
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:${color};letter-spacing:.04em">${full}</div>
        <div style="font-size:10px;color:var(--muted)">2026 NBA Playoffs &mdash; Round 1</div>
      </div>
    </div>
    <div class="pbanner">
      <div class="sb"><div class="v">${totalGP}</div><div class="l">Games</div></div>
      <div class="sb"><div class="v">${totalW}-${totalGP-totalW}</div><div class="l">Record</div></div>
      <div class="sb"><div class="v">${tsT}</div><div class="l">Pts For</div></div>
      <div class="sb"><div class="v">${taT}</div><div class="l">Pts Against</div></div>
      <div class="sb"><div class="v" style="color:${tm>0?'var(--green)':'var(--red)'}">${tm>0?'+':''}${tm}</div><div class="l">Margin</div></div>
    </div>
    ${cardsHtml}`;
}

  renderSeriesBar(); renderSeries();

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  document.getElementById('view-'+name).classList.add('active');

  if (name==='profile') renderProfile();
}

  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Fetching...';
  await fetchESPN();
  btn.disabled=false; btn.textContent='&#8635; Refresh';
}

function doExport() {
  alert('Export to Excel\n\nComing in the next update — this will download a fully formatted NBA_2026_Playoffs.xlsx with all current series data, dark styling, and formulas intact.');
}

buildTeamSelect();
renderSeriesBar();
renderSeries();
document.getElementById('statusMsg').textContent = 'Loading scores...';
document.getElementById('statusTime').textContent = new Date().toLocaleTimeString();
fetchESPN();
</script>
